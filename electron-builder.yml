appId: com.scrapecore.app
productName: ScrapeCore
copyright: Copyright © 2025 ScrapeCore

# What gets bundled into the installer
files:
  - electron/**
  - .next/standalone/**
  - "!node_modules/**"
  - "!src/**"

# electron-builder will also need node_modules for the main process;
# only production deps are included automatically via the asar.
asar: true

# Point electron-builder at our standalone output for extra resources
extraResources:
  - from: ".next/standalone"
    to: "app/.next/standalone"
    filter: "**/*"
  - from: "public"
    to: "app/public"
    filter: "**/*"

directories:
  output: dist-desktop
  buildResources: build-resources

# ── Windows NSIS installer ────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build-resources/icon.ico
  uninstallerIcon: build-resources/icon.ico
  shortcutName: ScrapeCore
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "ScrapeCore-Setup-${version}.exe"

# ── macOS dmg ─────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  icon: build-resources/icon.icns
  artifactName: "ScrapeCore-${version}-${arch}.dmg"

# ── Linux AppImage ────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build-resources/icon.png
  category: Office
  artifactName: "ScrapeCore-${version}.AppImage"

# ── Publishing (GitHub Releases) ─────────────────────────────────────────────
publish:
  provider: github
  owner: Bransolo1
  repo: ScrapeCore
