<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrapeCore — Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    h1 { font-size: 1.25rem; font-weight: 700; color: #f8fafc; }
    .subtitle { font-size: 0.875rem; color: #94a3b8; margin-top: 0.25rem; }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
    }
    input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.875rem;
      font-family: "Courier New", monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    .hint {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #64748b;
    }
    .hint a { color: #818cf8; cursor: pointer; text-decoration: underline; }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { background: #334155; color: #475569; cursor: not-allowed; }
    .error {
      margin-top: 1rem;
      padding: 0.625rem 0.875rem;
      background: #7f1d1d33;
      border: 1px solid #991b1b55;
      border-radius: 8px;
      font-size: 0.8125rem;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div>
        <h1>ScrapeCore</h1>
        <p class="subtitle">COM-B Behaviour Analysis</p>
      </div>
    </div>

    <p style="font-size:0.875rem;color:#94a3b8;line-height:1.6;">
      ScrapeCore uses <strong style="color:#e2e8f0">Claude AI</strong> to analyse behavioural data.
      Enter your Anthropic API key to get started.
    </p>

    <label for="apiKey">Anthropic API Key</label>
    <input
      id="apiKey"
      type="password"
      placeholder="sk-ant-api03-…"
      autocomplete="off"
      spellcheck="false"
    />
    <p class="hint">
      Get yours at <a id="consoleLink">console.anthropic.com</a> → API Keys
    </p>

    <div class="error" id="error"></div>

    <button id="launch" disabled>Launch ScrapeCore →</button>
  </div>

  <script>
    const input = document.getElementById("apiKey");
    const btn = document.getElementById("launch");
    const errorEl = document.getElementById("error");

    // Pre-fill if previously saved
    window.electronAPI.getApiKey().then((key) => {
      if (key) { input.value = key; btn.disabled = false; }
    });

    input.addEventListener("input", () => {
      btn.disabled = input.value.trim().length < 10;
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !btn.disabled) btn.click();
    });

    btn.addEventListener("click", async () => {
      const key = input.value.trim();
      if (!key) return;
      if (!key.startsWith("sk-ant-")) {
        errorEl.style.display = "block";
        errorEl.textContent = "Key should start with sk-ant- — check console.anthropic.com";
        return;
      }
      errorEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Starting…";
      await window.electronAPI.launchApp(key);
    });

    document.getElementById("consoleLink").addEventListener("click", () => {
      window.electronAPI.openExternal("https://console.anthropic.com/settings/keys");
    });
  </script>
</body>
</html>
