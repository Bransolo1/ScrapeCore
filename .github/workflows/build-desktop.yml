name: Build Desktop App

on:
  push:
    tags:
      - "v*"          # triggered by: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # or manually from the Actions tab

permissions:
  contents: write      # needed to upload release assets

jobs:
  build-windows:
    name: Windows installer (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js + copy standalone
        run: npm run build:desktop

      - name: Package Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrapeCore-Windows
          path: dist-desktop/ScrapeCore-Setup-*.exe
          retention-days: 30

      # If triggered by a tag, also attach to the GitHub Release
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/ScrapeCore-Setup-*.exe

  build-mac:
    name: macOS dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js + copy standalone
        run: npm run build:desktop

      - name: Package macOS dmg
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrapeCore-macOS
          path: dist-desktop/ScrapeCore-*.dmg
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/ScrapeCore-*.dmg
