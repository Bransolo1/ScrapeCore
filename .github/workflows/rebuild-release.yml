name: Rebuild v1.0.1 Release

on:
  push:
    branches:
      - claude/transfer-documents-SsyrI

permissions:
  contents: write

jobs:
  rebuild-windows:
    name: Build .exe and fix release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix tag and release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Delete the bad v.1.0.1 release
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'v.1.0.1' });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });
              core.info('Deleted old release v.1.0.1');
            } catch (e) { core.info('No old release to delete'); }

            // Delete the bad v.1.0.1 tag
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/v.1.0.1' });
              core.info('Deleted old tag v.1.0.1');
            } catch (e) { core.info('No old tag to delete'); }

            // Delete v1.0.1 tag if it already exists (from a previous attempt)
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/v1.0.1' });
            } catch (e) {}

            // Create correct v1.0.1 tag at this commit
            await github.rest.git.createRef({
              owner, repo,
              ref: 'refs/tags/v1.0.1',
              sha: context.sha,
            });
            core.info('Created tag v1.0.1');

      - name: Attach .exe to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: v1.0.1 - Stability fixes
          draft: true
          generate_release_notes: true
          files: dist-desktop/ScrapeCore-Setup-*.exe
